<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Travel V2 | Laboratorio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .texto-rojo { color: #dc2626; }
        header { backdrop-filter: blur(10px); background-color: rgba(0,0,0,0.8); }
    </style>
</head>

<body>
    <header class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center border-b border-zinc-900">
        <div class="text-xl font-black italic uppercase tracking-tighter">
            FAST <span class="texto-rojo">TRAVEL</span>
        </div>
        <button class="text-white text-2xl">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
    </header>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        
        <h1 id="titulo-principal" class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter mb-4">
            FAST <span class="texto-rojo">TRAVEL</span>
        </h1>

        <div id="espacio-logo" class="w-40 h-40 mb-8 flex items-center justify-center">
            <div class="w-32 h-32 border-2 border-dashed border-zinc-800 rounded-full flex items-center justify-center">
                <span class="text-[10px] text-zinc-600 uppercase">Espacio Logo</span>
            </div>
        </div>
        
        <h2 id="subtitulo" class="text-xs font-light text-gray-400 uppercase tracking-[0.6em] mb-12">
            Transporte Ejecutivo Privado
        </h2>

        <button id="boton-reserva" class="bg-red-700 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-[10px] shadow-2xl transition-all active:scale-95">
            Reservar Ahora
        </button>
    </section>

    <script>
        /* CONFIGURACIÓN DE LOS MOVIMIENTOS */
        
        // 1. Fast Travel de izquierda a derecha
        ScrollReveal().reveal('#titulo-principal', { 
            delay: 200, 
            distance: '100px', 
            origin: 'left', 
            duration: 1000 
        });

        // 2. El Logo aparece con escala (creciendo)
        ScrollReveal().reveal('#espacio-logo', { 
            delay: 500, 
            scale: 0.5, 
            duration: 1000 
        });

        // 3. Transporte Ejecutivo de abajo hacia arriba
        ScrollReveal().reveal('#subtitulo', { 
            delay: 800, 
            distance: '50px', 
            origin: 'bottom', 
            duration: 1000 
        });

        // 4. El botón aparece al final
        ScrollReveal().reveal('#boton-reserva', { 
            delay: 1100, 
            opacity: 0, 
            duration: 1000 
        });
    </script>
</body>
</html>
