<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Travel V2 | Laboratorio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .texto-rojo { color: #dc2626; }
        header { backdrop-filter: blur(10px); background-color: rgba(0,0,0,0.8); }
    </style>
</head>

<body>
    <header class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center border-b border-zinc-900">
        <div class="text-xl font-black italic uppercase tracking-tighter">
            FAST <span class="texto-rojo">TRAVEL</span>
        </div>
        
        <button class="text-white text-2xl">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
    </header>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        <h1 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter mb-4">
            EXPERIENCIA <br> <span class="texto-rojo text-6xl md:text-8xl">VIP</span>
        </h1>
        
        <p class="text-xs font-light text-gray-500 uppercase tracking-[0.5em] mb-10 max-w-xs">
            Transporte ejecutivo privado en Guayaquil
        </p>

        <button class="bg-red-700 hover:bg-red-600 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-[10px] shadow-[0_0_20px_rgba(185,28,28,0.4)] transition-all active:scale-95">
            Reservar Ahora
        </button>
    </section>

    <div class="py-10 text-center">
        <p class="text-[10px] text-zinc-700 uppercase tracking-widest italic">Cargando carrusel de seguridad...</p>
    </div>

</body>
</html>
