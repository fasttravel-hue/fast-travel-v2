<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Travel V2 | Laboratorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        html, body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        header { backdrop-filter: blur(10px); background: rgba(0,0,0,0.8); width: 100%; }
        #contenedor-celular { transition: all 0.5s ease; width: 260px; height: 530px; margin-bottom: 40px; }
        #contenedor-celular.expandido { width: 310px; height: 580px; }
        .phone-frame { width: 100%; height: 100%; background: #050505; border: 8px solid #1a1a1a; border-radius: 40px; position: relative; overflow: hidden; }
        #registro-interno { display: none; position: absolute; inset: 0; background: white; z-index: 50; color: #333; padding: 40px 20px; flex-direction: column; align-items: center; }
        #menu-lateral { position: fixed; top: 0; right: 0; height: 100%; width: 80%; background: #050505; z-index: 100; transition: 0.5s; transform: translateX(100%); border-l: 1px solid #222; }
        #menu-lateral.open { transform: translateX(0); }
    </style>
</head>
<body>
    <header class="fixed top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-black italic uppercase">FAST <span class="text-red-600">TRAVEL</span></div>
        <button onclick="toggleMenu()" class="text-white text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
    </header>

    <div id="menu-lateral" class="p-10 flex flex-col">
        <button onclick="toggleMenu()" class="self-end text-3xl mb-10">&times;</button>
        <nav class="flex flex-col gap-8 text-2xl font-black italic uppercase">
            <a href="#" class="text-red-600">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Flota</a>
            <a href="#">Contacto</a>
        </nav>
    </div>

    <main class="w-full flex flex-col items-center pt-32">
        <h1 id="t1" class="text-5xl font-black italic uppercase mb-4">FAST <span class="text-red-600">TRAVEL</span></h1>
        <img id="logo" src="1000917167-removebg-preview.png" class="w-56 h-auto mb-6">
        <h2 id="t2" class="text-[10px] text-gray-400 uppercase tracking-[0.5em] mb-12">Transporte Ejecutivo Privado</h2>

        <div id="contenedor-celular">
            <div class="phone-frame">
                <div id="registro-interno">
                    <button onclick="cerrarRegistro()" class="self-start text-3xl mb-2">&times;</button>
                    <h3 class="font-black uppercase mb-4 text-sm text-center">FAST TRAVEL <span class="text-red-600">ID</span></h3>
                    <div class="flex gap-6 mb-6 text-2xl text-gray-400">
                        <a href="https://www.instagram.com/fasttravel_hue/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                        <a href="https://www.tiktok.com/@fasttravel_hue" target="_blank"><i class="fa-brands fa-tiktok text-black"></i></a>
                        <a href="https://www.facebook.com/fasttravelhue" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                    </div>
                    <div class="w-full space-y-3">
                        <input type="text" placeholder="Nombre" class="w-full bg-gray-100 p-3 rounded-xl text-xs outline-none">
                        <input type="text" placeholder="WhatsApp" class="w-full bg-gray-100 p-3 rounded-xl text-xs outline-none">
                    </div>
                    <button onclick="window.location.href='https://ondelight.com'" class="w-full bg-black text-white py-4 rounded-xl mt-6 text-[10px] font-bold uppercase">Activar VIP</button>
                </div>
                <div class="swiper mySwiper h-full">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide" onclick="irWhatsApp()"><img src="1000922713.jpg" class="w-full h-full object-cover"></div>
                        <div class="swiper-slide" onclick="mostrarRegistro()"><img src="1000925510.jpg" class="w-full h-full object-cover"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-4 w-full max-w-[260px] pb-20">
            <button onclick="mostrarRegistro()" class="bg-red-700 text-white py-4 rounded-2xl font-black uppercase italic text-[11px] shadow-xl">Usar WebApp</button>
            <button onclick="irWhatsApp()" class="bg-zinc-900 text-green-500 py-4 rounded-2xl font-black uppercase italic text-[11px] border border-zinc-800">WhatsApp T-Go</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        function toggleMenu() { document.getElementById('menu-lateral').classList.toggle('open'); }
        function mostrarRegistro() { 
            document.getElementById('registro-interno').style.display = 'flex'; 
            document.getElementById('contenedor-celular').classList.add('expandido');
        }
        function cerrarRegistro() { 
            document.getElementById('registro-interno').style.display = 'none'; 
            document.getElementById('contenedor-celular').classList.remove('expandido');
        }
        function irWhatsApp() { window.location.href = "https://wa.me/593980287239"; }
        new Swiper(".mySwiper", { loop: true });
        ScrollReveal().reveal('#t1', { origin: 'left', distance: '50px', duration: 1000 });
        ScrollReveal().reveal('#logo', { scale: 0.8, duration: 1000, delay: 300 });
        ScrollReveal().reveal('#t2', { origin: 'bottom', distance: '20px', duration: 2000, delay: 600 });
    </script>
</body>
</html>
