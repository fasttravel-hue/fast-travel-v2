<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Travel V2 | Laboratorio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        html, body { background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .texto-rojo { color: #dc2626; }
        
        /* ESTILO DEL MARCO DEL CELULAR */
        .phone-frame {
            width: 280px;
            height: 570px;
            background: #111;
            border: 8px solid #222;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 0 50px rgba(220, 38, 38, 0.15);
            overflow: hidden;
        }
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #222;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 20;
        }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>

<body>
    <section class="min-h-screen w-full flex flex-col items-center justify-center py-20 px-6">
        
        <h2 class="text-xs font-bold texto-rojo uppercase tracking-[0.4em] mb-10">Solicita tu unidad</h2>

        <div id="celular-interactivo" class="phone-frame">
            <div class="phone-notch"></div>
            
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide cursor-pointer" onclick="window.location.href='https://wa.me/TU_NUMERO'">
                        <img src="CAPTURA_WHATSAPP.jpg" alt="Chat T-Go">
                        <div class="absolute bottom-10 left-0 w-full p-4 bg-black/60 backdrop-blur-sm text-center">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-green-500">Chatea con T-Go <i class="fa-brands fa-whatsapp ml-1"></i></p>
                        </div>
                    </div>

                    <div class="swiper-slide cursor-pointer" onclick="abrirRegistro()">
                        <img src="CAPTURA_WEBAPP.jpg" alt="WebApp Fast Travel">
                        <div class="absolute bottom-10 left-0 w-full p-4 bg-black/60 backdrop-blur-sm text-center">
                            <p class="text-[10px] font-bold uppercase tracking-widest texto-rojo text-white">Usar WebApp <i class="fa-solid fa-bolt ml-1"></i></p>
                        </div>
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <p class="mt-8 text-[9px] text-zinc-500 uppercase tracking-widest italic animate-pulse text-center">
            <i class="fa-solid fa-arrow-left-long mr-2"></i> Desliza el celular <i class="fa-solid fa-arrow-right-long ml-2"></i>
        </p>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Inicializar el carrusel del celular
        var swiper = new Swiper(".mySwiper", {
            effect: "cards",
            grabCursor: true,
            pagination: { el: ".swiper-pagination", clickable: true },
        });

        // Función para abrir el formulario que ya tienes
        function abrirRegistro() {
            // Aquí pegaremos el código del formulario de tu github original
            alert("Redirigiendo al Formulario de Registro...");
        }

        ScrollReveal().reveal('#celular-interactivo', { 
            delay: 300, distance: '100px', origin: 'right', duration: 1500, easing: 'cubic-bezier(0.5, 0, 0, 1)'
        });
    </script>
</body>
</html>
