<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Travel V2 | Laboratorio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .texto-rojo { color: #dc2626; }
        header { backdrop-filter: blur(10px); background-color: rgba(0,0,0,0.8); }
        
        /* Animación suave para la tarjeta */
        .card-shadow { shadow-[0_20px_50px_rgba(0,0,0,0.5)]; }
    </style>
</head>

<body>
    <header class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center border-b border-zinc-900">
        <div class="text-xl font-black italic uppercase tracking-tighter">
            FAST <span class="texto-rojo">TRAVEL</span>
        </div>
        <button class="text-white text-2xl">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
    </header>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        
        <h1 id="titulo-principal" class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter mb-4">
            FAST <span class="texto-rojo">TRAVEL</span>
        </h1>

        <div id="espacio-logo" class="w-48 h-48 mb-8 flex items-center justify-center">
            <img src="1000917167-removebg-preview.png" alt="Logo Fast Travel" class="w-full h-auto drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]">
            
        </div>
        
        <h2 id="subtitulo" class="text-xs font-light text-gray-400 uppercase tracking-[0.6em] mb-12">
            Transporte Ejecutivo Privado
        </h2>

        <div id="boton-reserva">
            <button class="bg-red-700 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-[10px] shadow-2xl active:scale-95 transition-transform">
                Reservar Ahora
            </button>
        </div>
    </section>

    <section class="py-24 px-6">
        <div id="tarjeta-seguridad" class="max-w-xs mx-auto bg-zinc-900/50 p-10 rounded-[50px] border border-zinc-800 text-left relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-900/20 blur-3xl rounded-full"></div>
            
            <div class="text-red-600 text-3xl mb-6"><i class="fa-solid fa-shield-halved"></i></div>
            <h3 class="font-bold text-xl mb-3 uppercase italic tracking-tighter">Seguridad <span class="texto-rojo">24/7</span></h3>
            <p class="text-gray-500 text-[10px] leading-relaxed uppercase tracking-widest">
                Viajes monitoreados en tiempo real para tu total tranquilidad.
            </p>
        </div>
    </section>

    <script>
        // Título de izquierda a derecha
        ScrollReveal().reveal('#titulo-principal', { 
            delay: 200, distance: '100px', origin: 'left', duration: 1000 
        });

        // Logo apareciendo
        ScrollReveal().reveal('#espacio-logo', { 
            delay: 500, scale: 0.7, duration: 1000 
        });

        // Subtítulo LENTO (Como lo configuraste)
        ScrollReveal().reveal('#subtitulo', { 
            delay: 1000, 
            distance: '50px', 
            origin: 'bottom', 
            duration: 2500,
            easing: 'cubic-bezier(0.5, 0, 0, 1)' 
        });

        // Botón apareciendo
        ScrollReveal().reveal('#boton-reserva', { 
            delay: 1500, opacity: 0, duration: 1000 
        });

        // LA TARJETA DESDE LA DERECHA (Efecto GitHub)
        ScrollReveal().reveal('#tarjeta-seguridad', { 
            delay: 500, 
            distance: '200px', 
            origin: 'right', 
            duration: 1800,
            easing: 'cubic-bezier(0.32, 0.72, 0, 1)'
        });
    </script>
</body>
</html>
