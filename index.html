<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Travel V2 | Laboratorio Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        html, body { 
            background-color: #000; color: #fff; font-family: sans-serif; 
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; 
        }
        .texto-rojo { color: #dc2626; }
        header { backdrop-filter: blur(10px); background-color: rgba(0,0,0,0.8); width: 100%; }
        .glow-logo { filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }

        /* ESTILO DEL MARCO DEL CELULAR - Diseño VIP */
        .phone-frame {
            width: 270px; /* Un poquito más de amplitud para el registro */
            height: 550px;
            background: #080808;
            border: 10px solid #1a1a1a;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.1);
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .phone-notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 100px; height: 20px; background: #1a1a1a;
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; z-index: 50;
        }

        /* Swiper interno */
        .swiper { width: 100%; height: 100%; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        /* REGISTRO DENTRO DEL CELULAR (Tu formulario original integrado) */
        #registro-interno {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 45; color: #333; padding: 50px 20px;
        }

        /* ESTILOS DE REDES SOCIALES ACTIVAS (AL SELECCIONAR) */
        .icon-ig.active { color: #E1306C !important; } /* Magenta Instagram */
        .icon-tiktok.active { color: #000000 !important; } /* Negro TikTok */
        .icon-fb.active { color: #1877F2 !important; } /* Azul Facebook */
        
        #menu-lateral { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #menu-lateral.open { transform: translateX(0); }
    </style>
</head>

<body>
    <header class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center border-b border-zinc-900">
        <div class="text-xl font-black italic uppercase tracking-tighter">
            FAST <span class="texto-rojo">TRAVEL</span>
        </div>
        <button onclick="toggleMenu()" class="text-white text-2xl pr-2"><i class="fa-solid fa-bars-staggered"></i></button>
    </header>

    <div id="menu-lateral" class="fixed top-0 right-0 h-full w-[80%] bg-zinc-950 z-[100] p-10 flex flex-col border-l border-zinc-800 shadow-2xl">
        <button onclick="toggleMenu()" class="text-white text-3xl self-end mb-10"><i class="fa-solid fa-xmark"></i></button>
        <nav class="flex flex-col gap-8 text-2xl font-black italic uppercase tracking-tighter text-white">
            <a href="#" class="text-red-600">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Flota</a>
            <a href="#">Contacto</a>
        </nav>
    </div>

    <main class="w-full flex flex-col items-center">
        <section class="min-h-screen w-full flex flex-col items-center justify-center text-center px-4 pt-20">
            <h1 id="titulo-principal" class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter mb-6">
                FAST <span class="texto-rojo">TRAVEL</span>
            </h1>
            <div id="espacio-logo" class="w-full max-w-[280px] aspect-square mb-8 flex items-center justify-center">
                <img src="1000917167-removebg-preview.png" alt="Logo VIP" class="max-w-full h-auto glow-logo">
            </div>
            
            <h2 id="subtitulo" class="w-full text-[10px] md:text-xs font-light text-gray-400 uppercase tracking-[0.5em] leading-relaxed">
                Transporte Ejecutivo Privado
            </h2>
        </section>

        <section class="w-full py-20 flex flex-col items-center border-t border-zinc-900 px-6">
            <p id="label-solicita" class="text-[10px] font-bold texto-rojo uppercase tracking-[0.4em] mb-10">Solicita tu unidad</p>
            
            <div id="celular-interactivo" class="phone-frame mb-10">
                <div class="phone-notch"></div>
                
                <div id="registro-interno" class="flex flex-col items-center overflow-y-auto">
                    <button onclick="cerrarRegistro()" class="self-start text-3xl mb-2 text-black">&times;</button>
                    <h3 class="text-xs font-black uppercase mb-4 tracking-tighter text-center">Fast Travel <span class="text-red-600">ID</span></h3>
                    
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-4">Selecciona tu red favorita:</p>
                    
                    <div class="flex gap-6 mb-6 text-2xl text-gray-400">
                        <a href="https://www.instagram.com/fasttravel_hue/" target="_blank" onclick="activarRed(this, 'ig')"><i class="fa-brands fa-instagram icon-ig"></i></a>
                        <a href="https://www.tiktok.com/@fasttravel_hue" target="_blank" onclick="activarRed(this, 'tiktok')"><i class="fa-brands fa-tiktok icon-tiktok"></i></a>
                        <a href="https://www.facebook.com/fasttravelhue" target="_blank" onclick="activarRed(this, 'fb')"><i class="fa-brands fa-facebook icon-fb"></i></a>
                    </div>

                    <div class="w-full space-y-3">
                        <input type="text" placeholder="Nombre Completo" class="w-full bg-gray-100 p-3 rounded-xl text-[10px] outline-none">
                        <input type="text" placeholder="Cédula" class="w-full bg-gray-100 p-3 rounded-xl text-[10px] outline-none">
                        <input type="text" placeholder="WhatsApp" class="w-full bg-gray-100 p-3 rounded-xl text-[10px] outline-none">
                        <input type="email" placeholder="Correo" class="w-full bg-gray-100 p-3 rounded-xl text-[10px] outline-none">
                        <input type="text" placeholder="Código Promocional" class="w-full bg-red-50 p-3 rounded-xl text-[10px] border border-red-100 text-red-400 placeholder-red-300">
                    </div>
                    <button onclick="window.location.href='https://fasttravel-hue.github.io/WebApp/'" class="w-full bg-black text-white text-[10px] font-bold py-4 rounded-xl mt-6 uppercase tracking-widest active:scale-95 transition-transform shadow-lg">
                        Activar Servicio VIP
                    </button>
                </div>

                                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide cursor-pointer" onclick="mostrarRegistro()">
                            <img src="1000925510.jpg" alt="WebApp Fast Travel">
                        </div>
                        
                        <div class="swiper-slide cursor-pointer" onclick="window.location.href='https://wa.me/593980287239'">
                            <img src="1000922713.jpg" alt="Chat T-Go">
                        </div>
                    </div>
                    <div class="swiper-pagination !bottom-10"></div>
                </div>
            </div>

            <div id="botones-celular" class="flex flex-col gap-4 w-full max-w-[260px]">
                <button onclick="mostrarRegistro()" class="bg-red-700 text-white py-5 rounded-2xl font-black uppercase italic tracking-widest text-[11px] shadow-2xl active:scale-95 transition-transform">
                    <i class="fa-solid fa-bolt mr-2"></i> Usar WebApp
                </button>
                <button onclick="window.location.href='https://wa.me/593980287239'" class="bg-zinc-900 border border-zinc-800 text-green-500 py-5 rounded-2xl font-black uppercase italic tracking-widest text-[11px] active:scale-95 transition-transform">
                    <i class="fa-brands fa-whatsapp mr-2 text-lg"></i> Chatear con T-Go
                </button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        function toggleMenu() { document.getElementById('menu-lateral').classList.toggle('open'); }
        
        function mostrarRegistro() { 
            document.getElementById('registro-interno').style.display = 'flex'; 
            // Expansión del celular para el registro
            document.getElementById('celular-interactivo').style.width = '320px';
            document.getElementById('celular-interactivo').style.height = '600px';
        }
        function cerrarRegistro() { 
            document.getElementById('registro-interno').style.display = 'none'; 
            // Vuelve a su tamaño original
            document.getElementById('celular-interactivo').style.width = '270px';
            document.getElementById('celular-interactivo').style.height = '550px';
        }

        // Función para activar color en iconos de redes sociales
        function activarRed(elemento, red) {
            // Quitamos 'active' de todos los iconos primero
            document.querySelectorAll('#registro-interno .fa-brands').forEach(icon => {
                icon.classList.remove('active');
            });
            // Añadimos 'active' al icono específico cliqueado
            elemento.querySelector('.fa-brands').classList.add('active');
        }

        var swiper = new Swiper(".mySwiper", { 
            loop: true, 
            pagination: { el: ".swiper-pagination", clickable: true },
        });

        ScrollReveal().reveal('#titulo-principal', { delay: 200, distance: '50px', origin: 'left', duration: 1200 });
        ScrollReveal().reveal('#espacio-logo', { delay: 600, scale: 0.8, duration: 1000 });
        ScrollReveal().reveal('#subtitulo', { delay: 1100, distance: '30px', origin: 'bottom', duration: 2500 });
        ScrollReveal().reveal('#celular-interactivo', { delay: 400, distance: '50px', origin: 'right', duration: 1500 });
    </script>
</body>
</html>
