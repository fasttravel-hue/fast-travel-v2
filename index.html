<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Travel V2 | Laboratorio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        html, body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        .texto-rojo { color: #dc2626; }
        header { backdrop-filter: blur(10px); background-color: rgba(0,0,0,0.8); width: 100%; }
        .glow-logo { filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }

        /* MARCO DEL CELULAR */
        .phone-frame {
            width: 260px; height: 530px; background: #050505;
            border: 8px solid #1a1a1a; border-radius: 40px;
            position: relative; overflow: hidden;
        }
        .phone-notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 100px; height: 20px; background: #1a1a1a;
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; z-index: 30;
        }

        /* FORMULARIO DENTRO DEL CELULAR */
        #registro-interno {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 25; color: #333; padding: 40px 20px;
        }

        #menu-lateral { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); transform: translateX(100%); }
        #menu-lateral.open { transform: translateX(0); }
    </style>
</head>

<body>
    <header class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center border-b border-zinc-900">
        <div class="text-xl font-black italic uppercase tracking-tighter">FAST <span class="texto-rojo">TRAVEL</span></div>
        <button onclick="toggleMenu()" class="text-white text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
    </header>

    <div id="menu-lateral" class="fixed top-0 right-0 h-full w-[80%] bg-zinc-950 z-[100] p-10 flex flex-col border-l border-zinc-800 shadow-2xl text-2xl font-black italic uppercase">
        <button onclick="toggleMenu()" class="text-white text-3xl self-end mb-10"><i class="fa-solid fa-xmark"></i></button>
        <nav class="flex flex-col gap-8">
            <a href="#" class="text-red-600">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Flota</a>
            <a href="#">Contacto</a>
        </nav>
    </div>

    <main class="w-full flex flex-col items-center">
        <section class="min-h-screen w-full flex flex-col items-center justify-center text-center px-4">
            <h1 id="titulo-principal" class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter mb-6">FAST <span class="texto-rojo">TRAVEL</span></h1>
            <div id="espacio-logo" class="w-full max-w-[280px] aspect-square mb-8 flex items-center justify-center">
                <img src="1000917167-removebg-preview.png" alt="Logo VIP" class="max-w-full h-auto glow-logo">
            </div>
            <h2 id="subtitulo" class="text-[10px] font-light text-gray-400 uppercase tracking-[0.5em] leading-relaxed">Transporte Ejecutivo Privado</h2>
        </section>

        <section class="w-full py-20 flex flex-col items-center border-t border-zinc-900">
            <p class="text-[10px] font-bold texto-rojo uppercase tracking-[0.4em] mb-10">Solicita tu unidad</p>
            
            <div id="celular-interactivo" class="phone-frame mb-10">
                <div class="phone-notch"></div>
                
                <div id="registro-interno" class="flex flex-col items-center overflow-y-auto">
                    <button onclick="cerrarRegistro()" class="self-start text-2xl mb-2 text-black">&times;</button>
                    <h3 class="text-xs font-black uppercase mb-4">Fast Travel <span class="text-red-600">ID</span></h3>
                    <div class="flex gap-4 mb-4 text-xl text-gray-400">
                        <i class="fa-brands fa-instagram"></i> <i class="fa-brands fa-tiktok text-black"></i> <i class="fa-brands fa-facebook"></i>
                    </div>
                    <div class="w-full space-y-2">
                        <input type="text" placeholder="Nombre" class="w-full bg-gray-100 p-3 rounded-xl text-[10px]">
                        <input type="text" placeholder="Cédula" class="w-full bg-gray-100 p-3 rounded-xl text-[10px]">
                        <input type="text" placeholder="WhatsApp" class="w-full bg-gray-100 p-3 rounded-xl text-[10px]">
                        <input type="text" placeholder="Código Promo" class="w-full bg-red-50 p-3 rounded-xl text-[10px] border border-red-100">
                    </div>
                    <button onclick="window.location.href='https://ondelight.com'" class="w-full bg-black text-white text-[10px] font-bold py-4 rounded-xl mt-4 uppercase">Activar VIP</button>
                </div>

                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide cursor-pointer" onclick="irWhatsApp()"><img src="1000922713.jpg"></div>
                        <div class="swiper-slide cursor-pointer" onclick="mostrarRegistro()"><img src="1000925510.jpg"></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4 w-full max-w-[280px] px-4">
                <button onclick="mostrarRegistro()" class="bg-red-700 text-white py-5 rounded-2xl font-black uppercase italic tracking-widest text-[11px] shadow-xl"><i class="fa-solid fa-bolt mr-2"></i> Usar WebApp</button>
                <button onclick="irWhatsApp()" class="bg-zinc-900 border border-zinc-800 text-green-500 py-5 rounded-2xl font-black uppercase italic tracking-widest text-[11px]"><i class="fa-brands fa-whatsapp mr-2 text-lg"></i> Chatear con T-Go</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        function toggleMenu() { document.getElementById('menu-lateral').classList.toggle('open'); }
        function mostrarRegistro() { document.getElementById('registro-interno').style.display = 'flex'; }
        function cerrarRegistro() { document.getElementById('registro-interno').style.display = 'none'; }
        function irWhatsApp() { window.location.href = "https://wa.me/593980287239"; }

        var swiper = new Swiper(".mySwiper", { loop: true });

        ScrollReveal().reveal('#titulo-principal', { delay: 200, distance: '50px', origin: 'left', duration: 1200 });
        ScrollReveal().reveal('#espacio-logo', { delay: 600, scale: 0.8, duration: 1000 });
        ScrollReveal().reveal('#subtitulo', { delay: 1100, distance: '30px', origin: 'bottom', duration: 2500 });
        ScrollReveal().reveal('#celular-interactivo', { delay: 400, distance: '50px', origin: 'right', duration: 1500 });
    </script>
</body>
</html>
